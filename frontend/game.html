<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status Zero - Jogo</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black: #0a0a0a;
      --white: #f5f0e8;
      --red: #c1121f;
      --ink: #1a1a2e;
      --panel: #ece8df;
      --border: 2px solid #0a0a0a;
      --font: 'Comic Sans MS', 'Comic Sans', cursive;
    }

    body {
      font-family: var(--font);
      background: var(--black);
      color: var(--white);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ======================================================
     Top bar
     ====================================================== */
    .topbar {
      background: var(--black);
      border-bottom: 2px solid #333;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .topbar-title {
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .topbar-time {
      font-size: 12px;
      opacity: 0.6;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .back-btn {
      font-family: var(--font);
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: none;
      border: 1px solid #444;
      color: var(--white);
      padding: 4px 10px;
      cursor: pointer;
      transition: border-color 0.1s, color 0.1s;
    }

    .back-btn:hover {
      border-color: var(--white);
    }

    /* ======================================================
     Stats bar
     ====================================================== */
    .statsbar {
      background: #111;
      border-bottom: var(--border);
      padding: 8px 16px;
      display: flex;
      gap: 16px;
      flex-shrink: 0;
      overflow-x: auto;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 56px;
    }

    .stat-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.5;
      margin-bottom: 4px;
      white-space: nowrap;
    }

    .stat-bar-wrap {
      width: 100%;
      height: 6px;
      background: #333;
      border: 1px solid #444;
    }

    .stat-bar-fill {
      height: 100%;
      background: var(--white);
      transition: width 0.4s;
    }

    .stat-bar-fill.red {
      background: var(--red);
    }

    .stat-value {
      font-size: 12px;
      font-weight: bold;
      margin-top: 3px;
    }

    /* ======================================================
     Main layout
     ====================================================== */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ======================================================
     Narrative panel
     ====================================================== */
    .narrative {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: var(--border);
    }

    .narrative-log {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      scroll-behavior: smooth;
      /* thin manga dot overlay */
      background-image: radial-gradient(circle, #ffffff06 1px, transparent 1px);
      background-size: 10px 10px;
    }

    /* scrollbar */
    .narrative-log::-webkit-scrollbar {
      width: 4px;
    }

    .narrative-log::-webkit-scrollbar-track {
      background: #111;
    }

    .narrative-log::-webkit-scrollbar-thumb {
      background: #444;
    }

    .log-entry {
      margin-bottom: 20px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .log-entry.player {
      text-align: right;
    }

    .log-bubble {
      display: inline-block;
      max-width: 85%;
      padding: 10px 14px;
      border: var(--border);
      font-size: 14px;
      line-height: 1.5;
      position: relative;
    }

    .log-bubble.narration {
      background: #1a1a2e;
      border-color: #333;
      color: var(--white);
      text-align: left;
    }

    .log-bubble.player-text {
      background: var(--panel);
      color: var(--black);
    }

    .log-bubble.arc-event {
      background: var(--red);
      color: var(--white);
      font-weight: bold;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 1px;
      border-color: var(--red);
      width: 100%;
      text-align: center;
    }

    .log-bubble.system-text {
      background: #222;
      color: #888;
      font-size: 12px;
      font-style: italic;
      border-color: #333;
      text-align: center;
      width: 100%;
    }

    /* ======================================================
     Input area
     ====================================================== */
    .input-area {
      border-top: var(--border);
      padding: 12px 16px;
      background: #0d0d0d;
      flex-shrink: 0;
    }

    .input-hint {
      font-size: 11px;
      opacity: 0.4;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-row textarea {
      flex: 1;
      font-family: var(--font);
      font-size: 14px;
      background: #1a1a1a;
      color: var(--white);
      border: var(--border);
      padding: 10px 12px;
      resize: none;
      height: 64px;
      outline: none;
      line-height: 1.4;
    }

    .input-row textarea:focus {
      border-color: #666;
    }

    .send-btn {
      font-family: var(--font);
      font-size: 13px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: var(--white);
      color: var(--black);
      border: var(--border);
      padding: 0 18px;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
      flex-shrink: 0;
    }

    .send-btn:hover {
      background: var(--red);
      color: var(--white);
      border-color: var(--red);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    /* ======================================================
     Side panel (arcs + info)
     ====================================================== */
    .sidebar {
      width: 220px;
      display: flex;
      flex-direction: column;
      background: #0d0d0d;
      flex-shrink: 0;
      overflow: hidden;
    }

    @media (max-width: 640px) {
      .sidebar {
        display: none;
      }
    }

    .sidebar-section {
      border-bottom: var(--border);
      padding: 12px;
    }

    .sidebar-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.4;
      margin-bottom: 8px;
    }

    .arc-entry {
      font-size: 12px;
      padding: 6px 8px;
      border: 1px solid #333;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .arc-entry.active {
      border-color: var(--red);
      color: var(--white);
    }

    .arc-entry.closed {
      opacity: 0.4;
    }

    .arc-name {
      font-weight: bold;
      display: block;
      margin-bottom: 2px;
    }

    .arc-days {
      font-size: 10px;
      opacity: 0.5;
    }

    .sidebar-arcs {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .sidebar-arcs::-webkit-scrollbar {
      width: 3px;
    }

    .sidebar-arcs::-webkit-scrollbar-thumb {
      background: #333;
    }
  </style>
</head>

<body>

  <!-- Top bar -->
  <div class="topbar">
    <button class="back-btn" onclick="goBack()">Voltar</button>
    <div class="topbar-title" id="slot-title">Carregando...</div>
    <div class="topbar-time" id="time-display">Dia 1 - Manha</div>
  </div>

  <!-- Stats bar -->
  <div class="statsbar">
    <div class="stat">
      <div class="stat-label">Sanidade</div>
      <div class="stat-bar-wrap">
        <div class="stat-bar-fill" id="bar-sanity" style="width:100%"></div>
      </div>
      <div class="stat-value" id="val-sanity">100</div>
    </div>
    <div class="stat">
      <div class="stat-label">Confianca</div>
      <div class="stat-bar-wrap">
        <div class="stat-bar-fill" id="bar-confidence" style="width:50%"></div>
      </div>
      <div class="stat-value" id="val-confidence">50</div>
    </div>
    <div class="stat">
      <div class="stat-label">Violencia</div>
      <div class="stat-bar-wrap">
        <div class="stat-bar-fill red" id="bar-violence" style="width:0%"></div>
      </div>
      <div class="stat-value" id="val-violence">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Status</div>
      <div class="stat-bar-wrap">
        <div class="stat-bar-fill" id="bar-social" style="width:50%"></div>
      </div>
      <div class="stat-value" id="val-social">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Meta</div>
      <div class="stat-bar-wrap">
        <div class="stat-bar-fill red" id="bar-meta" style="width:0%"></div>
      </div>
      <div class="stat-value" id="val-meta">0</div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Narrative -->
    <div class="narrative">
      <div class="narrative-log" id="log"></div>
      <div class="input-area">
        <div class="input-hint">Use "fala entre aspas" e *acao entre asteriscos*</div>
        <div class="input-row">
          <textarea id="inp-action" placeholder='"Ei, o que voce quer?" *olha para os lados com cautela*'
            onkeydown="handleKey(event)"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendAction()">Enviar</button>
        </div>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Memoria</div>
        <div id="memory-text" style="font-size:12px;opacity:0.6;font-style:italic;line-height:1.4">
          Sem resumo ainda.
        </div>
      </div>
      <div class="sidebar-label" style="padding:12px 12px 4px">Arcos</div>
      <div class="sidebar-arcs" id="arcs-list">
        <div style="font-size:12px;opacity:0.4;font-style:italic">Nenhum arco ainda.</div>
      </div>
    </div>

  </div>

  <script>
    // ============================================================
    // Config - mesmo valor do index.html
    // ============================================================
    const API_BASE = "http://localhost:8000";

    // ============================================================
    // State - carregado do sessionStorage (preenchido pelo index.html)
    // ============================================================
    let slotId = sessionStorage.getItem("slot_id");
    let authToken = sessionStorage.getItem("auth_token");

    // ============================================================
    // Boot
    // ============================================================
    window.addEventListener("DOMContentLoaded", async () => {
      if (!slotId || !authToken) {
        window.location.href = "index.html";
        return;
      }
      await loadSlot();
      await loadHistory();
      await loadArcs();
    });

    async function api(method, path, body = null) {
      const opts = {
        method,
        headers: {
          "Authorization": `Bearer ${authToken}`,
          "Content-Type": "application/json",
        },
      };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(`${API_BASE}${path}`, opts);

      // Token expirado: redireciona para login sem travar o jogo
      if (res.status === 401) {
        appendLog("system", "Sessao expirada. Redirecionando para o login...");
        setTimeout(() => {
          sessionStorage.removeItem("slot_id");
          sessionStorage.removeItem("auth_token");
          window.location.href = "index.html";
        }, 2000);
        throw new Error("Sessao expirada");
      }

      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Erro");
      return data;
    }

    async function loadSlot() {
      try {
        const slot = await api("GET", `/slots/${slotId}`);
        document.getElementById("slot-title").textContent = slot.title;
        updateStats(slot.world_state);
        updateTime(slot.world_state.current_day, slot.world_state.current_phase);
        if (slot.memory_summary) {
          document.getElementById("memory-text").textContent = slot.memory_summary;
        }
      } catch (err) {
        if (err.message !== "Sessao expirada") {
          appendLog("system", `Erro ao carregar slot: ${err.message}`);
        }
      }
    }

    async function loadHistory() {
      try {
        const events = await api("GET", `/slots/${slotId}/history?limit=60`);
        for (const ev of events) {
          appendLog(ev.type, ev.content, false);
        }
        scrollLog();
      } catch (_) { }
    }

    async function loadArcs() {
      try {
        const arcs = await api("GET", `/slots/${slotId}/arcs`);
        renderArcs(arcs);
      } catch (_) { }
    }

    // ============================================================
    // Action
    // ============================================================
    async function sendAction() {
      const textarea = document.getElementById("inp-action");
      const raw = textarea.value.trim();
      if (!raw) return;

      setSending(true);
      textarea.value = "";

      appendLog("player_action", raw);

      try {
        const result = await api("POST", `/slots/${slotId}/action`, { input: raw });
        appendLog("narration", result.narration);
        updateStats(result.world_state);
        updateTime(result.current_day, result.current_phase);
        await loadArcs();
      } catch (err) {
        if (err.message !== "Sessao expirada") {
          appendLog("system", `Erro: ${err.message}`);
        }
      } finally {
        setSending(false);
        scrollLog();
      }
    }

    function handleKey(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendAction();
      }
    }

    // ============================================================
    // UI
    // ============================================================

    function appendLog(type, content, animate = true) {
      const log = document.getElementById("log");
      const entry = document.createElement("div");
      entry.className = "log-entry" + (type === "player_action" ? " player" : "");

      const bubble = document.createElement("div");

      if (type === "player_action") {
        bubble.className = "log-bubble player-text";
      } else if (type === "arc_event") {
        bubble.className = "log-bubble arc-event";
      } else if (type === "system") {
        bubble.className = "log-bubble system-text";
      } else {
        bubble.className = "log-bubble narration";
      }

      bubble.textContent = content;
      entry.appendChild(bubble);

      if (!animate) entry.style.animation = "none";
      log.appendChild(entry);
    }

    function scrollLog() {
      const log = document.getElementById("log");
      log.scrollTop = log.scrollHeight;
    }

    function updateStats(ws) {
      if (!ws) return;
      setBar("sanity", ws.sanity, 100);
      setBar("confidence", ws.confidence, 100);
      setBar("violence", ws.violence, 100);
      // social_status vai de -100 a 100, normaliza para 0-100 na barra
      setBar("social", ws.social_status + 100, 200);
      document.getElementById("val-social").textContent = ws.social_status;
      setBar("meta", ws.meta_awareness, 100);
    }

    function setBar(key, value, max) {
      const pct = Math.max(0, Math.min(100, (value / max) * 100));
      const fill = document.getElementById(`bar-${key}`);
      const val = document.getElementById(`val-${key}`);
      if (fill) fill.style.width = pct + "%";
      if (val && key !== "social") val.textContent = value;
    }

    const phaseNames = { morning: "Manha", afternoon: "Tarde", night: "Noite" };

    function updateTime(day, phase) {
      document.getElementById("time-display").textContent =
        `Dia ${day} - ${phaseNames[phase] || phase}`;
    }

    function renderArcs(arcs) {
      const el = document.getElementById("arcs-list");
      if (!arcs.length) {
        el.innerHTML = '<div style="font-size:12px;opacity:0.4;font-style:italic">Nenhum arco ainda.</div>';
        return;
      }
      el.innerHTML = arcs.map(a => `
    <div class="arc-entry ${a.status}">
      <span class="arc-name">${escHtml(a.title)}</span>
      <span class="arc-days">Dia ${a.start_day}${a.end_day ? " - " + a.end_day : " (ativo)"}</span>
    </div>
  `).join("");
    }

    function setSending(loading) {
      const btn = document.getElementById("send-btn");
      const ta = document.getElementById("inp-action");
      btn.disabled = loading;
      ta.disabled = loading;
      btn.textContent = loading ? "..." : "Enviar";
    }

    function goBack() {
      window.location.href = "index.html";
    }

    function escHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
  </script>
</body>

</html>
